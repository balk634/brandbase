services:
  web:
    image: calcom/cal.com:v6.2.0
    container_name: calcom-web
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_PUBLIC_WEBAPP_URL=https://booking.brandbase.in
      - WEBAPP_URL=https://booking.brandbase.in
      - NEXTAUTH_URL=https://booking.brandbase.in
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    container_name: calcom-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

  db:
    image: postgres:15
    container_name: calcom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: calcom_user
      POSTGRES_PASSWORD: STR0NG_P4SSW0RD_2026
      POSTGRES_DB: calcom
    volumes:
      - calcom_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calcom_user -d calcom"]
      interval: 5s
      retries: 10

volumes:
  calcom_pgdata:
