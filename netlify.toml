[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Using standard build for stability on Netlify for now
  NEXT_USE_NETLIFY_EDGE = "false"
  # Next.js 16 might have Turbopack on by default
  NEXT_TURBO = "0"
  NETLIFY_NEXTJS_RUNTIME_V5 = "true"
  NODE_VERSION = "22"
  # Disable secrets scanning
  SECRETS_SCAN_ENABLED = "false"

# Disable secrets scanning for specific keys
[build.secrets]
  omitKeys = ["CONTACT_TO_EMAIL", "RESEND_FROM_EMAIL", "RESEND_API_KEY"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  included_files = ["public/**"]

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/_next/image"
  to = "/.netlify/images"
  status = 200
  query = {url = ":url", w = ":width", q = ":quality"}

[[redirects]]
  from = "/_ipx/*"
  to = "/.netlify/images"
  status = 200
  query = {url = ":url", w = ":width", q = ":quality"}
