[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Using standard build for stability on Netlify for now
  NEXT_USE_NETLIFY_EDGE = "false"
  # Next.js 16 might have Turbopack on by default
  NEXT_TURBO = "0"
  NETLIFY_NEXTJS_RUNTIME_V5 = "true"
  NODE_VERSION = "22"
  # Disable secrets scanning
  SECRETS_SCAN_ENABLED = "false"

# Disable secrets scanning for specific keys
[build.secrets]
  omitKeys = ["CONTACT_TO_EMAIL", "RESEND_FROM_EMAIL", "RESEND_API_KEY"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  included_files = ["public/**"]

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://app.cal.com https://booking.brandbase.in https://static.cloudflareinsights.com https://*.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://booking.brandbase.in https://static.cloudflareinsights.com https://*.clarity.ms https://*.bing.com; frame-src 'self' https://app.cal.com https://booking.brandbase.in; upgrade-insecure-requests"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
