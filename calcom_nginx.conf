server {
    listen 80;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://calcom-web:3000;

        # 1. Force uncompressed response from Calcom
        # This is CRITICAL. sub_filter cannot read gzipped binary data.
        proxy_set_header Accept-Encoding "";

        # 2. Inject CSS directly into the <head> tag
        # This hides the toggle and branding as soon as they mount in the DOM.
        sub_filter '<head>' 
                   '<head><style>
                      [data-testid="overlay-calendar-switch"], 
                      [data-testid="powered-by-cal"], 
                      .cal-branding { display: none !important; }
                   </style>';

        sub_filter_once on;
        sub_filter_types text/html;
    }
}
