version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: calcom-proxy
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - calcom-web

  database:
    image: postgres:16-alpine
    container_name: calcom-db
    restart: always
    environment:
      POSTGRES_USER: calcom
      POSTGRES_PASSWORD: calcom-password-9801
      POSTGRES_DB: calcom
    volumes:
      - calcom-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calcom -d calcom"]
      interval: 10s
      timeout: 5s
      retries: 5

  calcom-web:
    image: calcom/cal.com:latest
    container_name: calcom-web
    restart: always
    environment:
      - DATABASE_URL=postgresql://calcom:calcom-password-9801@database:5432/calcom
      - NEXT_PUBLIC_WEBAPP_URL=https://booking.brandbase.in
      - CALENDSO_ENCRYPTION_KEY=3SMiXzU5qDWl2PJ/D7a7f3+VrPjWeH5CYjcqvvpBq1A=
      - NEXTAUTH_SECRET=BuWhiZatKj1lUoFOnJ5OlKqsVrw7iflLn22mMKKUYTg=
      - NEXTAUTH_URL=https://booking.brandbase.in
      - NEXT_PUBLIC_WEB_RECAPTCHA_SITE_KEY=
      - RECAPTCHA_SECRET_KEY=
      - JWT_SECRET=BuWhiZatKj1lUoFOnJ5OlKqsVrw7iflLn22mMKKUYTg=
    expose:
      - "3000"
    volumes:
      - /root/brandbase/calcom/logo.svg:/next/public/logo.svg
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  calcom-db-data:
